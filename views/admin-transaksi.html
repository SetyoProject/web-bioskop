<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Data Transaksi</title>

    <link rel="stylesheet" href="/admin.css">
    <script defer src="/admin-transaksi.js"></script>
</head>
<body>

<button class="menu-toggle">
    ☰
</button>

<div class="wrapper">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">

        <div class="logo">
            🎬 CinemaKu
        </div>

        <nav>

            <a href="/panel-admin">
                Dashboard
            </a>

            <a
                href="/panel-admin/transaksi"
                class="active">
                Transaksi
            </a>

            <a href="/panel-admin/customer">
                Pelanggan
            </a>

        </nav>

        <button id="logoutButton">
            Logout
        </button>

    </aside>

    <!-- Main -->
    <main class="main-content">

        <header class="topbar">

            <div>
                <h1>Data Transaksi</h1>
                <p>
                    Daftar transaksi pemesanan tiket bioskop
                </p>
            </div>

        </header>

        <section class="box table-section">

            <h2>Daftar Transaksi</h2>

            <table>

                <thead>

                <tr>

                    <th>Kode Booking</th>
                    <th>Nama</th>
                    <th>Film</th>
                    <th>Total</th>
                    <th>Status Pembayaran</th>
                    <th>Status Tiket</th>
                    <th>Waktu Scan</th>
                    <th>Aksi</th>

                </tr>

                </thead>

                <tbody id="transactionTable">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script>

const menuToggle =
    document.querySelector(
        '.menu-toggle'
    );

const sidebar =
    document.getElementById(
        'sidebar'
    );

menuToggle?.addEventListener(
    'click',
    () => {
        sidebar.classList.toggle(
            'active'
        );
    }
);

</script>

</body>
</html>
