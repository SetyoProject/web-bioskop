<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Dashboard Admin</title>

    <link rel="stylesheet"href="/admin.css">

    <script defer src="/admin.js"></script>
</head>
<body>
<button class="menu-toggle"> ☰</button>

<div class="wrapper">

    <!-- Sidebar -->
    <aside
        class="sidebar">
        <div class="logo">
            CinemaKu
        </div>
        <nav>
            <a href="/panel-admin" class="active">
                📊 Dashboard
            </a>

            <a
                href="/panel-admin/transaksi"
            >
                🎟️ Transaksi
            </a>

            <a
                href="/panel-admin/scan"
            >
                📷 Scan Tiket
            </a>

        </nav>

        <button
            id="logoutButton"
        >
            Logout
        </button>

    </aside>

    <!-- Main -->
    <main
        class="main-content"
    >

        <!-- Header -->
        <header
            class="topbar"
        >

            <div>

                <h1>
                    Dashboard Admin
                </h1>

                <p>
                    Kelola film dan transaksi bioskop
                </p>

            </div>

        </header>


        <!-- Statistik -->
        <section
            class="cards"
        >

            <div
                class="card"
            >

                <span>
                    🎬 Jumlah Film
                </span>

                <h2
                    id="movieCount"
                >
                    0
                </h2>

            </div>

            <div
                class="card"
            >

                <span>
                    🎟️ Total Transaksi
                </span>

                <h2
                    id="bookingCount"
                >
                    0
                </h2>

            </div>

            <div
                class="card"
            >

                <span>
                    💰 Pendapatan
                </span>

                <h2
                    id="totalRevenue"
                >
                    Rp0
                </h2>

            </div>

            <div
                class="card"
            >

                <span>
                    💺 Tiket Terjual
                </span>

                <h2
                    id="ticketCount"
                >
                    0
                </h2>

            </div>

        </section>


        <!-- Form Tambah Film -->
        <section
            id="movieFormContainer"
        >

        </section>


        <!-- Daftar Film -->
        <section
            id="movieListContainer"
        >

        </section>


        <!-- Booking Terbaru -->
        <section
            id="bookingContainer"
        >

        </section>

    </main>

</div>

</body>
</html>
