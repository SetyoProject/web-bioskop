<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Scan Tiket</title>

    <link
        rel="stylesheet"
        href="/admin.css"
    >

    <script
        src="https://unpkg.com/html5-qrcode"
    ></script>

    <script
        defer
        src="/scan.js"></script>

</head>
<body>
<button class="menu-toggle"> ☰</button>

<div class="wrapper">

    <!-- Sidebar -->
    <aside
        class="sidebar">
        <div class="logo">
            🎬 CinemaKu
        </div>
        <nav>
            <a href="/panel-admin" class="active">
                📊 Dashboard
            </a>

            <a
                href="/panel-admin/transaksi"
            >
                🎟️ Transaksi
            </a>

            <a
                href="/panel-admin/customer"
            >
                👤 Pelanggan
            </a>

            <a
                href="/panel-admin/scan"
            >
                📷 Scan Tiket
            </a>

        </nav>

        <button
            id="logoutButton"
        >
            🚪 Logout
        </button>

    </aside>

    <!-- Main -->
    <main class="main-content">

    <header class="topbar">

        <div>
            <h1>Scan Tiket</h1>
            <p>Validasi tiket pelanggan</p>
        </div>

    </header>

    <!-- Preview Kamera -->
    <section class="box">

        <div class="scanner-header">

            <h2>
                Kamera Scanner
            </h2>

            <button id="switchCamera">
                🔄 Ganti Kamera
            </button>

        </div>

        <div
            id="reader"
            class="scanner"
        ></div>

        <p id="cameraInfo">
            Membuka kamera...
        </p>

    </section>

    <!-- Hasil Scan -->
    <section class="box">

        <h2>
            Hasil Scan
        </h2>

        <div id="ticketResult">

            Arahkan QR tiket ke kamera.

        </div>

    </section>

</main>

</div>

</body>
</html>
