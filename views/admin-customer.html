<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pelanggan</title>

    <link rel="stylesheet" href="/admin.css">
    <script defer src="/admin-customer.js"></script>
</head>
<body>

<button class="menu-toggle">
    ☰
</button>

<div class="wrapper">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">

        <div class="logo">
            🎬 CinemaKu
        </div>

        <nav>

            <a href="/panel-admin">
                Dashboard
            </a>

            <a href="/panel-admin/transaksi">
                Transaksi
            </a>

            <a href="/panel-admin/customer" class="active">
                Pelanggan
            </a>

        </nav>

        <button id="logoutButton">
            Logout
        </button>

    </aside>


    <!-- Main -->
    <main class="main-content">

        <header class="topbar">

            <div>
                <h1>Data Pelanggan</h1>
                <p>Daftar pelanggan yang telah melakukan pemesanan tiket</p>
            </div>

        </header>


        <section class="box table-section">

            <h2>Daftar Pelanggan</h2>

            <table>

                <thead>

                <tr>

                    <th>Kode Booking</th>
                    <th>Nama Pelanggan</th>
                    <th>No HP</th>
                    <th>Total Pembayaran</th>
                    <th>Status</th>
                    <th>Tanggal Booking</th>

                </tr>

                </thead>

                <tbody id="customerTable">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script>

const menuToggle =
    document.querySelector('.menu-toggle');

const sidebar =
    document.getElementById('sidebar');

menuToggle?.addEventListener(
    'click',
    () => {

        sidebar.classList.toggle('active');

    }
);

</script>

</body>
</html>
