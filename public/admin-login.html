<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>

    <link rel="stylesheet" href="admin-login.css">

    <script defer src="admin-login.js"></script>
</head>
<body>

<div class="login-container">

    <div class="login-box">

        <h1>CinemaKu Admin</h1>

        <p>Masuk ke panel administrator</p>

        <form id="loginForm">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">

                Login

            </button>

        </form>

        <p id="loginMessage"></p>

    </div>

</div>

</body>
</html>
