<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>CinemaKu</title>

    <link
        rel="stylesheet"
        href="style.css"
    >
</head>
<body>

<nav>

    <div class="logo">
        CinemaKu
    </div>

    <ul>

        <li>
            <a href="/">
                Home
            </a>
        </li>

        <li>
            <a href="/film">
                Film
            </a>
        </li>

        <li>
            <a href="/checkout">

                Keranjang

                <span id="cartBadge">
                    0
                </span>

            </a>
        </li>

    </ul>

</nav>


<section class="hero">

    <div class="overlay">

        <h1>
            Feel the Movies Beyond
        </h1>

        <p>
            Nikmati pengalaman menonton
            terbaik bersama CinemaKu
        </p>

        <section class="search-section">

    <input
        type="text"
        id="searchInput"
        placeholder="Cari film favorit kamu..."
    >

    <button id="searchButton">

        Cari

    </button>

</section>

        <!-- Slider Banner -->

        <div class="slider">

            <div class="slides">

                <img
                    src="uploads/banner1.jpg"
                    alt="Banner 1"
                >

                <img
                    src="uploads/banner2.jpg"
                    alt="Banner 2"
                >

                <img
                    src="uploads/banner3.jpg"
                    alt="Banner 3"
                >

            </div>

        </div>

    </div>

</section>


<section class="now-playing">

    <div class="section-title">

        <h2>
            🎬 Now Playing
        </h2>

        <a href="/film">

            <button>
                Lihat Semua
            </button>

        </a>

    </div>

    <section>

    <div id="movieGrid">

    </div>

</section>

<div id="bookingModal" class="modal">

    <div class="modal-content">

        <span class="close">&times;</span>

        <h2>Pilih Tiket</h2>

        <select id="studioSelect">
            <option>Studio 1</option>
            <option>Studio 2</option>
        </select>

        <select id="scheduleSelect">
            <option>13:00</option>
            <option>16:00</option>
            <option>19:00</option>
        </select>
<h3>Pilih Kursi</h3>

<div class="screen">
    LAYAR
</div>

<div id="seatContainer"></div>

        <div id="bookingAlert"></div>
        <button id="confirmSeat">
            Tambah ke Keranjang
        </button>

    </div>

</div>

<div id="toast"></div>


</section>


<footer>

    <h2>
        CinemaKu
    </h2>

    <p>
        Pesan tiket bioskop dengan mudah,
        cepat, dan praktis.
    </p>

    <p>
        © 2026 CinemaKu.
        All Rights Reserved.
    </p>

</footer>

<script src="app.js"></script>

</body>
</html>
